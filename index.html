<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Сканер Участников</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      body {
        background-color: #0b0d19;
      }

      #app-shell {
        position: relative;
        width: 100%;
        max-width: 420px;
        min-height: 700px;
        background-image: url("img/background.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        border-radius: 2rem;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      #app-shell::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          rgba(11, 13, 25, 0.2) 0%,
          rgba(11, 13, 25, 0.85) 100%
        );
        z-index: 0;
      }

      .content-layer {
        position: relative;
        z-index: 1;
      }

      .title {
        color: #ffffff;
        font-family: "Arial Rounded MT Bold", Arial, Helvetica, sans-serif;
        font-weight: bold;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
      }

      .scaner-button {
        font-family: "Arial Rounded MT Bold", Arial, Helvetica, sans-serif;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
        margin-top: 100px;
      }

      .event-text {
        font-family: "Arial Rounded MT Bold", Arial, Helvetica, sans-serif;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
      }

      /* Toast notification */
      #toast {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%) translateY(120%);
        z-index: 9999;
        min-width: 280px;
        max-width: 360px;
        transition:
          transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
          opacity 0.35s ease;
        opacity: 0;
        pointer-events: none;
      }

      #toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
        pointer-events: auto;
      }
    </style>
  </head>

  <body
    class="text-gray-100 font-sans min-h-screen p-4 flex items-center justify-center"
  >
    <!-- Toast notification -->
    <div id="toast">
      <div
        id="toast-inner"
        class="flex items-start gap-3 rounded-2xl px-4 py-3.5 shadow-2xl border backdrop-blur-md"
      >
        <span id="toast-icon" class="text-xl mt-0.5 shrink-0"></span>
        <div>
          <p id="toast-title" class="font-bold text-sm leading-tight"></p>
          <p id="toast-body" class="text-xs mt-0.5 opacity-80 leading-snug"></p>
        </div>
      </div>
    </div>

    <div id="app-shell" class="p-6">
      <header class="text-center my-4 content-layer">
        <h1 class="text-3xl title tracking-wide">LEVEL DANCE</h1>
        <p class="event-text">Мероприятия</p>
        <p
          class="text-xs text-purple-200 font-medium tracking-widest uppercase mt-2"
        >
          Контроль Доступа
        </p>
      </header>

      <main class="w-full content-layer my-auto">
        <div id="scan-container" class="w-full text-center p-2">
          <p class="text-gray-100 text-sm mb-8 font-medium drop-shadow-md">
            Нажмите кнопку ниже, чтобы открыть камеру Telegram и отсканировать
            QR-код билета.
          </p>

          <button
            type="button"
            onclick="startScanning()"
            class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 px-6 rounded-xl transition duration-200 shadow-lg shadow-purple-900/50 active:scale-95 text-base tracking-wide scaner-button"
          >
            [ ] Открыть сканер
          </button>
        </div>

        <div
          id="result-container"
          class="w-full bg-slate-950/75 backdrop-blur-md rounded-2xl border border-white/10 p-5 shadow-xl hidden"
        >
          <h2
            id="event-title"
            class="text-base font-bold text-center text-purple-200 border-b border-white/10 pb-3 mb-4 tracking-wide"
          >
            Название мероприятия
          </h2>

          <div class="space-y-3.5 text-sm">
            <div>
              <span
                class="text-[10px] text-gray-400 uppercase font-bold tracking-widest block"
                >Статус билета</span
              >
              <p id="ticket-status" class="font-bold mt-0.5">—</p>
            </div>

            <div>
              <span
                class="text-[10px] text-gray-400 uppercase font-bold tracking-widest block"
                >ФИО Покупателя</span
              >
              <p id="buyer-name" class="font-semibold text-white mt-0.5">—</p>
            </div>

            <div>
              <span
                class="text-[10px] text-gray-400 uppercase font-bold tracking-widest block"
                >Telegram аккаунт</span
              >
              <p id="tg-username" class="text-purple-300 mt-0.5">—</p>
            </div>

            <div class="grid grid-cols-2 gap-2 pt-2 border-t border-white/5">
              <div>
                <span
                  class="text-[10px] text-gray-400 uppercase font-bold tracking-widest block"
                  >ID / Тип</span
                >
                <p id="event-info" class="text-xs text-gray-200 mt-0.5">—</p>
              </div>
              <div class="text-right">
                <span
                  class="text-[10px] text-gray-400 uppercase font-bold tracking-widest block"
                  >Цена билета</span
                >
                <p id="ticket-price" class="text-emerald-400 font-bold mt-0.5">
                  —
                </p>
              </div>
            </div>
          </div>

          <button
            onclick="resetScanner()"
            class="w-full mt-6 bg-white/10 hover:bg-white/20 text-white font-medium py-2.5 px-4 rounded-xl border border-white/10 transition duration-200 text-sm shadow-inner"
          >
            Сканировать следующий
          </button>
        </div>
      </main>
    </div>

    <script>
      const tg =
        window.Telegram && window.Telegram.WebApp
          ? window.Telegram.WebApp
          : null;

      // СЮДА СВОЙ ДОМЕН / URL ОТ NGROK СЕРВЕРА FASTAPI
      const API_BASE_URL = "https://daughter-equate-suburb.ngrok-free.dev";

      // ─── Toast уведомления ───────────────────────────────────────────────────

      let toastTimer = null;

      function showToast(type, title, body = "") {
        const toast = document.getElementById("toast");
        const inner = document.getElementById("toast-inner");
        const icon = document.getElementById("toast-icon");
        const ttl = document.getElementById("toast-title");
        const tbd = document.getElementById("toast-body");

        // Сбрасываем предыдущий таймер, если был
        if (toastTimer) clearTimeout(toastTimer);

        // Стили по типу
        const styles = {
          error: {
            wrap: "bg-red-950/90 border-red-500/40 text-red-100",
            ico: "❌",
          },
          warn: {
            wrap: "bg-amber-950/90 border-amber-500/40 text-amber-100",
            ico: "⚠️",
          },
          success: {
            wrap: "bg-emerald-950/90 border-emerald-500/40 text-emerald-100",
            ico: "✅",
          },
        };

        const s = styles[type] || styles.error;
        inner.className = `flex items-start gap-3 rounded-2xl px-4 py-3.5 shadow-2xl border backdrop-blur-md ${s.wrap}`;
        icon.textContent = s.ico;
        ttl.textContent = title;
        tbd.textContent = body;

        toast.classList.add("show");

        // Автоскрытие через 4 секунды
        toastTimer = setTimeout(() => {
          toast.classList.remove("show");
        }, 4000);
      }

      // Закрытие по тапу на тост
      document.getElementById("toast").addEventListener("click", () => {
        document.getElementById("toast").classList.remove("show");
        if (toastTimer) clearTimeout(toastTimer);
      });

      // ─── Инициализация ТГ WebApp ────────────────────────────────────────────

      function initTelegramWebApp() {
        if (!tg) return;
        try {
          tg.ready();
          if (typeof tg.expand === "function") tg.expand();
        } catch (e) {
          // Тихая ошибка инициализации — не мешаем работе
        }
      }

      initTelegramWebApp();

      // ─── Состояние загрузки карточки ────────────────────────────────────────

      function setLoadingState() {
        document.getElementById("event-title").innerText =
          "Загрузка данных билета...";
        document.getElementById("buyer-name").innerText = "—";
        document.getElementById("tg-username").innerText = "—";
        document.getElementById("event-info").innerText = "—";
        document.getElementById("ticket-price").innerText = "—";
        document.getElementById("ticket-status").innerText = "—";
      }

      // ─── Запуск сканера ──────────────────────────────────────────────────────

      function startScanning() {
        if (!tg) {
          showToast(
            "error",
            "Недоступно вне Telegram",
            "Откройте приложение через Telegram.",
          );
          return;
        }
        if (
          typeof tg.isVersionAtLeast !== "function" ||
          !tg.isVersionAtLeast("6.4")
        ) {
          showToast(
            "error",
            "Обновите Telegram",
            "Ваша версия приложения не поддерживает сканер QR.",
          );
          return;
        }

        tg.showScanQrPopup(
          { text: "Наведите камеру на QR-код билета" },
          function (text) {
            handleScannedUrl(text);
            return true;
          },
        );
      }

      // ─── Обработка отсканированного URL ─────────────────────────────────────

      function handleScannedUrl(text) {
        if (!text || typeof text !== "string") {
          showToast(
            "error",
            "Пустой QR-код",
            "Не удалось прочитать данные. Попробуйте ещё раз.",
          );
          return;
        }

        let parsedUrl;
        try {
          parsedUrl = new URL(text);
        } catch {
          showToast(
            "error",
            "Неверный QR-код",
            "Этот код не является билетом мероприятия.",
          );
          return;
        }

        const ticketId = parsedUrl.searchParams.get("startapp");
        if (!ticketId) {
          showToast(
            "error",
            "Неверный QR-код",
            "В коде отсутствует идентификатор билета.",
          );
          return;
        }

        fetchDataFromServer(ticketId);
      }

      // ─── Запрос на сервер ────────────────────────────────────────────────────

      async function fetchDataFromServer(ticketId) {
        setLoadingState();
        document.getElementById("scan-container").classList.add("hidden");
        document.getElementById("result-container").classList.remove("hidden");

        const targetUrl = `${API_BASE_URL}/api/participant/${encodeURIComponent(ticketId)}`;

        try {
          const response = await fetch(targetUrl, {
            method: "GET",
            headers: {
              "Content-Type": "application/json",
              "X-Tg-Init-Data": tg?.initData || "",
              "ngrok-skip-browser-warning": "69420",
            },
          });

          if (!response.ok) {
            resetScanner();
            if (response.status === 404) {
              showToast(
                "error",
                "Билет не найден",
                "Этот QR-код не зарегистрирован в системе.",
              );
            } else if (response.status === 403) {
              showToast(
                "error",
                "Нет доступа",
                "Авторизация не прошла. Обратитесь к организатору.",
              );
            } else {
              showToast(
                "error",
                "Ошибка сервера",
                `Код ответа: ${response.status}. Попробуйте позже.`,
              );
            }
            return;
          }

          const data = await response.json();
          renderTicketCard(data);
        } catch {
          resetScanner();
          showToast(
            "error",
            "Нет связи с сервером",
            "Проверьте интернет-соединение и попробуйте снова.",
          );
        }
      }

      // ─── Отрисовка карточки билета ───────────────────────────────────────────

      function renderTicketCard(ticket) {
        document.getElementById("event-title").innerText =
          ticket?.event_name || "Без названия";
        document.getElementById("buyer-name").innerText =
          ticket?.name || "Не указано";
        document.getElementById("tg-username").innerText = ticket?.username
          ? `@${ticket.username}`
          : "Нет юзернейма";

        const typeRu =
          ticket?.event_type === "festival" ? "Фестиваль" : "Концерт";
        document.getElementById("event-info").innerText =
          `#${ticket?.event_id || 0} [${typeRu}]`;
        document.getElementById("ticket-price").innerText = ticket?.price
          ? `${ticket.price} ₽`
          : "0 ₽";

        const statusElement = document.getElementById("ticket-status");
        if (ticket?.entered_at) {
          statusElement.innerText = `❌ УЖЕ ИСПОЛЬЗОВАН (${ticket.entered_at})`;
          statusElement.className =
            "text-xs font-bold mt-0.5 text-red-400 bg-red-950/40 p-1.5 rounded border border-red-500/20";
        } else {
          statusElement.innerText = "✅ ДЕЙСТВИТЕЛЕН (Вход разрешен)";
          statusElement.className =
            "text-xs font-bold mt-0.5 text-emerald-400 bg-emerald-950/40 p-1.5 rounded border border-emerald-500/20";
        }

        document.getElementById("scan-container").classList.add("hidden");
        document.getElementById("result-container").classList.remove("hidden");
      }

      // ─── Сброс сканера ───────────────────────────────────────────────────────

      function resetScanner() {
        document.getElementById("result-container").classList.add("hidden");
        document.getElementById("scan-container").classList.remove("hidden");
      }
    </script>
  </body>
</html>
