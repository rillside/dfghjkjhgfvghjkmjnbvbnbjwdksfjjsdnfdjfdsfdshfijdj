<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Сканер Участников</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      /* Общий фон страницы (для больших экранов/планшетов) — просто плоский тёмный цвет */
      body {
        background-color: #0b0d19;
      }

      /* Окошко приложения по центру — ТЕПЕРЬ ТУТ ТВОЕ ФОТО */
      #app-shell {
        position: relative;
        width: 100%;
        max-width: 420px; /* Ограничение ширины карточки */
        min-height: 700px; /* Минимальная высота, чтобы фото смотрелось красиво */
        background-image: url("img/background.jpg"); /* СЮДА ТВОЕ ФОТО */
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        border-radius: 2rem; /* Закругляем края самого фото */
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      /* Затемняющий слой ПРЯМО ПОВЕРХ ФОТО, чтобы кнопки и текст были читаемыми */
      #app-shell::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          rgba(11, 13, 25, 0.2) 0%,
          rgba(11, 13, 25, 0.75) 100%
        );
        z-index: 0;
      }

      /* Поднимаем весь контент над слоем затемнения */
      .content-layer {
        position: relative;
        z-index: 1;
      }

      .title {
        color: #ffffff;
        font-family: "Arial Rounded MT Bold", Arial, Helvetica, sans-serif;
        font-weight: bold;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6); /* Чтобы текст не терялся на фото */
      }

      .scaner-button {
        font-family: "Arial Rounded MT Bold", Arial, Helvetica, sans-serif;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
        margin-top: 100px;
      }

      .event-text {
        font-family: "Arial Rounded MT Bold", Arial, Helvetica, sans-serif;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
      }
    </style>
  </head>

  <body
    class="text-gray-100 font-sans min-h-screen p-4 flex items-center justify-center"
  >
    <div id="app-shell" class="p-6">
      <header class="text-center my-4 content-layer">
        <h1 class="text-3xl title tracking-wide">LEVEL DANCE</h1>
        <p class="event-text">Мероприятия</p>
        <p
          class="text-xs text-purple-200 font-medium tracking-widest uppercase mt-2"
        >
          Контроль Доступа
        </p>
      </header>

      <main class="w-full content-layer my-auto">
        <div id="scan-container" class="w-full text-center p-2">
          <p class="text-gray-100 text-sm mb-8 font-medium drop-shadow-md">
            Нажмите кнопку ниже, чтобы открыть камеру Telegram и отсканировать
            QR-код зрителя.
          </p>

          <div
            id="error-message"
            class="hidden text-sm text-red-200 bg-red-950/80 border border-red-500/40 rounded-xl p-3 mb-4"
          ></div>

          <button
            type="button"
            onclick="startScanning()"
            class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 px-6 rounded-xl transition duration-200 shadow-lg shadow-purple-900/50 active:scale-95 text-base tracking-wide scaner-button"
          >
            [ ] Открыть сканер
          </button>
        </div>

        <div
          id="result-container"
          class="w-full bg-slate-950/60 backdrop-blur-md rounded-2xl border border-white/10 p-5 shadow-xl hidden"
        >
          <h2
            class="text-lg font-bold text-center text-purple-200 border-b border-white/10 pb-3 mb-4 tracking-wide"
          >
            Данные участника
          </h2>

          <div class="space-y-4">
            <div>
              <span
                class="text-[10px] text-gray-400 uppercase font-bold tracking-widest"
                >ФИО</span
              >
              <p id="user-name" class="text-lg font-bold text-white mt-0.5">
                —
              </p>
            </div>
            <div>
              <span
                class="text-[10px] text-gray-400 uppercase font-bold tracking-widest"
                >Категория</span
              >
              <div>
                <p
                  id="user-ticket"
                  class="inline-block px-3 py-0.5 text-xs font-bold rounded-md bg-purple-500/20 text-purple-200 border border-purple-500/30 mt-1"
                >
                  —
                </p>
              </div>
            </div>
            <div>
              <span
                class="text-[10px] text-gray-400 uppercase font-bold tracking-widest"
                >Статус отметки</span
              >
              <p
                id="user-status"
                class="text-sm font-semibold mt-1 text-gray-200"
              >
                —
              </p>
            </div>
          </div>

          <button
            onclick="resetScanner()"
            class="w-full mt-6 bg-white/10 hover:bg-white/20 text-white font-medium py-2.5 px-4 rounded-xl border border-white/10 transition duration-200 text-sm"
          >
            Сканировать следующего
          </button>
        </div>
      </main>
    </div>

    <script>
      const tg =
        window.Telegram && window.Telegram.WebApp
          ? window.Telegram.WebApp
          : null;
      const API_BASE_URL = "https://твой-домен-сервера.ru";

      function initTelegramWebApp() {
        if (!tg) return;
        try {
          tg.ready();
          if (typeof tg.expand === "function") tg.expand();
        } catch (error) {
          console.warn("Telegram Web App init error:", error);
        }
      }

      function showError(message) {
        const errorElement = document.getElementById("error-message");
        errorElement.innerText = message;
        errorElement.classList.remove("hidden");
      }

      function hideError() {
        const errorElement = document.getElementById("error-message");
        errorElement.classList.add("hidden");
        errorElement.innerText = "";
      }

      function setLoadingState() {
        hideError();
        document.getElementById("user-name").innerText = "Загрузка...";
        document.getElementById("user-ticket").innerText = "—";
        document.getElementById("user-status").innerText = "—";
      }

      initTelegramWebApp();

      function startScanning() {
        hideError();
        if (!tg) {
          showError("Откройте страницу внутри Telegram Web Apps.");
          return;
        }
        if (
          typeof tg.isVersionAtLeast !== "function" ||
          !tg.isVersionAtLeast("6.4")
        ) {
          showError("Пожалуйста, обновите Telegram до версии 6.4 или выше.");
          return;
        }
        tg.showScanQrPopup(
          { text: "Наведите камеру на QR-код гостя" },
          function (text) {
            handleScannedUrl(text);
            return true;
          },
        );
      }

      function handleScannedUrl(text) {
        if (!text || typeof text !== "string") {
          showError("Получен некорректный QR-код.");
          return;
        }
        let parsedUrl;
        try {
          parsedUrl = new URL(text);
        } catch (error) {
          showError("QR-код не содержит рабочий URL.");
          return;
        }
        const participantId = parsedUrl.searchParams.get("startapp");
        if (!participantId) {
          showError("В QR-коде не найден параметр startapp.");
          return;
        }
        fetchDataFromServer(participantId);
      }

      async function fetchDataFromServer(participantId) {
        setLoadingState();
        try {
          const response = await fetch(
            `${API_BASE_URL}/api/participant/${encodeURIComponent(participantId)}`,
            {
              method: "GET",
              headers: {
                "Content-Type": "application/json",
                "X-Tg-Init-Data": tg?.initData || "",
              },
            },
          );
          if (!response.ok) {
            if (response.status === 404) throw new Error("Участник не найден.");
            throw new Error("Ошибка сервера.");
          }
          const data = await response.json();
          renderParticipantCard(data);
        } catch (error) {
          showError(error.message || "Не удалось получить данные.");
          resetScanner();
        }
      }

      function renderParticipantCard(user) {
        hideError();
        document.getElementById("user-name").innerText =
          user?.name || "Без имени";
        document.getElementById("user-ticket").innerText =
          user?.ticket_type || "Обычный";
        const statusElement = document.getElementById("user-status");
        if (user?.checked_in) {
          statusElement.innerText = "❌ Уже отмечен (Вход выполнен)";
          statusElement.className = "text-sm font-semibold mt-1 text-red-400";
        } else {
          statusElement.innerText = "✅ Доступ разрешен (Впервые)";
          statusElement.className = "text-sm font-semibold mt-1 text-green-400";
        }
        document.getElementById("scan-container").classList.add("hidden");
        document.getElementById("result-container").classList.remove("hidden");
      }

      function resetScanner() {
        hideError();
        document.getElementById("result-container").classList.add("hidden");
        document.getElementById("scan-container").classList.remove("hidden");
      }
    </script>
  </body>
</html>
